<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Audio Denoiser & Mixer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header id="upload-zone">
            <h2>Drag & Drop Audio File</h2>
            <p>Processing via PyTorch Backend...</p>
        </header>

        <main id="mixer-workspace" class="hidden">
            <div class="mixer-layout">
                <div id="stem-board"></div>

                <div class="master-section">
                    <h3>Presence</h3>
                    <div class="dial-container" id="presence-dial-container">
                        <div class="dial" id="presence-dial">
                            <div class="dial-indicator"></div>
                        </div>
                    </div>
                    <p id="dial-value">0.0 dB</p>
                </div>
            </div>
        </main>

        <footer id="playback-controller" class="hidden">
            <button id="play-pause-btn">Play</button>
            <input type="range" id="master-volume" min="0" max="1" step="0.01" value="0.8">
            <label for="master-volume">Master Vol</label>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
